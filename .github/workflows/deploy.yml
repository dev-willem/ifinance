name: Deploy — Produção

on:
  workflow_run:
    workflows: ["CI — Backend", "CI — Frontend"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      backend_image:
        description: 'Tag da imagem backend (ex: sha-abc1234)'
        required: false
        default: 'latest'
      frontend_image:
        description: 'Tag da imagem frontend (ex: sha-abc1234)'
        required: false
        default: 'latest'

jobs:
  deploy:
    name: Deploy para servidor de produção
    runs-on: ubuntu-latest
    # Só executa se ambos os CIs passaram (quando acionado por workflow_run)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Adicionar host ao known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Copiar docker-compose para servidor
        run: |
          scp docker-compose.yml ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/docker-compose.yml

      - name: Deploy
        env:
          BACKEND_TAG: ${{ github.event.inputs.backend_image || 'latest' }}
          FRONTEND_TAG: ${{ github.event.inputs.frontend_image || 'latest' }}
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'ENDSSH'
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # Atualizar imagens
            docker compose --profile prod pull

            # Subir com zero-downtime (replace)
            docker compose --profile prod up -d --remove-orphans

            # Limpar imagens antigas
            docker image prune -f
          ENDSSH

      - name: Verificar health
        run: |
          sleep 30
          curl --fail --retry 5 --retry-delay 10 \
            "${{ vars.PRODUCTION_URL }}/actuator/health" \
            | grep -q '"status":"UP"' \
            && echo "Backend UP" || (echo "Health check falhou" && exit 1)
