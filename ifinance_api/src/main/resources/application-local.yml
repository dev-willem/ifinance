# Perfil local — banco local, OAuth2 via .env, debug SQL habilitado
# Carrega automaticamente ifinance_api/.env como source de variáveis
spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ifinance_dev}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 3000
      validation-timeout: 1000

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:test}
            client-secret: ${GOOGLE_CLIENT_SECRET:test}
            scope: openid, email, profile
        provider:
          google:
            issuer-uri: https://accounts.google.com

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=60m

management:
  endpoint:
    health:
      show-details: always

springdoc:
  cache:
    disabled: true

logging:
  level:
    com.willembergfilho.ifinance: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

server:
  port: ${SERVER_PORT:8888}
