services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ifinance_dev
      POSTGRES_USER: ifinance
      POSTGRES_PASSWORD: ifinance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ifinance"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - docker

  db-prod:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - prod

  app:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: docker
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      DB_USERNAME: ifinance
      DB_PASSWORD: ifinance
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - docker

  app-prod:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db-prod
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SERVER_PORT: 8080
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      db-prod:
        condition: service_healthy
    profiles:
      - prod

volumes:
  postgres_data:
  postgres_prod_data:
